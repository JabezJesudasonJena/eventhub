<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - Eventify</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">✨ Eventify</a>
            <div class="navbar-menu">
                <a href="index.html" class="nav-link">Home</a>
                
                <div id="guest-menu" class="navbar-menu">
                    <a href="login.html" class="nav-link">Login</a>
                    <a href="register.html" class="nav-link">Register</a>
                </div>
                
                <div id="user-menu" class="user-menu hidden">
                    <span class="user-name" id="user-name-display"></span>
                    <span class="user-role" id="user-role-display"></span>
                    <a href="form.html" class="nav-link admin-only">Create Event</a>
                    <button class="logout-btn" id="logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Back Link -->
        <a href="index.html" class="back-link">← Back to Events</a>

        <!-- Page Header -->
        <div class="page-header">
            <h1 id="event-title" class="page-title">Event Details</h1>
        </div>

        <!-- Message display area -->
        <div id="message" class="message hidden"></div>

        <!-- Event details -->
        <div id="event-details" class="event-details">
            <div class="loading">Loading event details...</div>
        </div>

        <!-- Registration form -->
        <div id="registration-section" class="form-container hidden">
            <h2>Register for this Event</h2>
            <form id="registration-form">
                <div class="form-group">
                    <label for="name">Your Name *</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                </div>

                <button type="submit" class="btn btn-primary">Register Now</button>
            </form>
        </div>

        <!-- Registrations list -->
        <div id="registrations-section" class="registrations-section hidden">
            <h2>Registered Attendees (<span id="registration-count">0</span>)</h2>
            <div id="registrations-list"></div>
        </div>
    </div>

    <script>
        // API Base URL
        const API_URL = window.location.origin || 'http://localhost:3000';
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');

        // Auth state
        let currentUser = null;
        let authToken = null;

        // Initialize auth
        function initAuth() {
            authToken = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            if (authToken && userStr) {
                try {
                    currentUser = JSON.parse(userStr);
                    updateNavbar();
                } catch (e) {
                    console.error('Error parsing user data:', e);
                    logout();
                }
            } else {
                updateNavbar();
            }
        }

        // Update navbar
        function updateNavbar() {
            const guestMenu = document.getElementById('guest-menu');
            const userMenu = document.getElementById('user-menu');
            
            if (currentUser) {
                guestMenu.classList.add('hidden');
                userMenu.classList.remove('hidden');
                document.getElementById('user-name-display').textContent = currentUser.name;
                document.getElementById('user-role-display').textContent = currentUser.role;
                
                if (currentUser.role === 'admin') {
                    document.querySelectorAll('.admin-only').forEach(el => {
                        el.classList.add('visible');
                    });
                }
            } else {
                guestMenu.classList.remove('hidden');
                userMenu.classList.add('hidden');
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.reload();
        }

        document.getElementById('logout-btn')?.addEventListener('click', logout);

        // Show message to user
        function showMessage(text, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            setTimeout(() => {
                messageEl.className = 'message hidden';
            }, 3000);
        }

        // Format date for display
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load event details
        async function loadEventDetails() {
            if (!eventId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const headers = {};
                if (authToken) {
                    headers['Authorization'] = `Bearer ${authToken}`;
                }

                const response = await fetch(`${API_URL}/events/${eventId}`, { headers });
                if (!response.ok) throw new Error('Event not found');
                
                const data = await response.json();
                const event = data.event || data;
                displayEventDetails(event);
                loadRegistrations();
            } catch (error) {
                console.error('Error loading event:', error);
                showMessage('Failed to load event details', 'error');
                document.getElementById('event-details').innerHTML = 
                    '<div class="error">Event not found or failed to load.</div>';
            }
        }

        // Display event details
        function displayEventDetails(event) {
            document.getElementById('event-title').textContent = event.name;
            document.getElementById('event-details').innerHTML = `
                <div class="event-detail-card">
                    <h2>${escapeHtml(event.name)}</h2>
                    <div class="detail-row">
                        <strong>📅 Date</strong>
                        <span>${formatDate(event.date)}</span>
                    </div>
                    <div class="detail-row">
                        <strong>📍 Location</strong>
                        <span>${escapeHtml(event.location)}</span>
                    </div>
                    <div class="detail-row">
                        <strong>📝 Description</strong>
                        <p>${escapeHtml(event.description || 'No description provided')}</p>
                    </div>
                </div>
            `;

            // Show registration form only if logged in as regular user
            if (currentUser && currentUser.role === 'user') {
                document.getElementById('registration-section').classList.remove('hidden');
            } else if (!currentUser) {
                // Show message to log in
                const regSection = document.getElementById('registration-section');
                regSection.innerHTML = `
                    <div class="message info">
                        <p>Please <a href="login.html">log in</a> to register for this event.</p>
                    </div>
                `;
                regSection.classList.remove('hidden');
            }
        }

        // Load registrations
        async function loadRegistrations() {
            // Only show registrations to admins
            if (!currentUser || currentUser.role !== 'admin') {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/events/${eventId}/registrations`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                if (!response.ok) throw new Error('Failed to fetch registrations');
                
                const data = await response.json();
                const registrations = data.registrations || data;
                displayRegistrations(registrations);
            } catch (error) {
                console.error('Error loading registrations:', error);
            }
        }

        // Display registrations
        function displayRegistrations(registrations) {
            const section = document.getElementById('registrations-section');
            const countEl = document.getElementById('registration-count');
            const listEl = document.getElementById('registrations-list');

            countEl.textContent = registrations.length;

            if (registrations.length === 0) {
                listEl.innerHTML = '<p class="empty-state">No registrations yet.</p>';
            } else {
                listEl.innerHTML = `
                    <div class="registrations-grid">
                        ${registrations.map(reg => `
                            <div class="registration-item">
                                <strong>👤 ${escapeHtml(reg.user_name || reg.name)}</strong>
                                <span>${escapeHtml(reg.user_email || reg.email)}</span>
                                <small>Status: ${escapeHtml(reg.status || 'registered')}</small>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            section.classList.remove('hidden');
        }

        // Handle registration form submission
        document.getElementById('registration-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!currentUser) {
                showMessage('Please log in to register', 'error');
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/events/${eventId}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to register');
                }

                showMessage('Successfully registered for the event!', 'success');
                
                // Hide registration form after successful registration
                setTimeout(() => {
                    window.location.reload();
                }, 1500);
            } catch (error) {
                console.error('Error registering:', error);
                showMessage(error.message || 'Failed to register', 'error');
            }
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initAuth();
            loadEventDetails();
        });
    </script>
</body>
</html>
