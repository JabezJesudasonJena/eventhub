<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Form - Event Registration System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-link">← Back to Events</a>
            <h1 id="form-title">Create New Event</h1>
        </header>

        <!-- Message display area -->
        <div id="message" class="message hidden"></div>

        <!-- Event form -->
        <div class="form-container">
            <form id="event-form">
                <div class="form-group">
                    <label for="name">Event Name *</label>
                    <input type="text" id="name" name="name" required 
                           placeholder="e.g., Tech Conference 2026">
                </div>

                <div class="form-group">
                    <label for="date">Event Date *</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="form-group">
                    <label for="location">Location *</label>
                    <input type="text" id="location" name="location" required 
                           placeholder="e.g., San Francisco, CA">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="5" 
                              placeholder="Tell people about your event..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submit-btn">Create Event</button>
                    <a href="index.html" class="btn">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // API Base URL - automatically uses the same domain as the frontend
        const API_URL = window.location.origin || 'http://localhost:3000';
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');
        const isEditMode = !!eventId;

        // Update UI for edit mode
        if (isEditMode) {
            document.getElementById('form-title').textContent = 'Edit Event';
            document.getElementById('submit-btn').textContent = 'Update Event';
            loadEventForEdit();
        }

        // Show message to user
        function showMessage(text, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            setTimeout(() => {
                messageEl.className = 'message hidden';
            }, 3000);
        }

        // Load event data for editing
        async function loadEventForEdit() {
            try {
                const response = await fetch(`${API_URL}/events/${eventId}`);
                if (!response.ok) throw new Error('Event not found');
                
                const event = await response.json();
                
                // Populate form fields
                document.getElementById('name').value = event.name;
                document.getElementById('date').value = event.date.split('T')[0]; // Format date for input
                document.getElementById('location').value = event.location;
                document.getElementById('description').value = event.description || '';
            } catch (error) {
                console.error('Error loading event:', error);
                showMessage('Failed to load event data', 'error');
            }
        }

        // Handle form submission
        document.getElementById('event-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get form data
            const formData = {
                name: document.getElementById('name').value.trim(),
                date: document.getElementById('date').value,
                location: document.getElementById('location').value.trim(),
                description: document.getElementById('description').value.trim()
            };

            // Validation
            if (!formData.name || !formData.date || !formData.location) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            try {
                const url = isEditMode 
                    ? `${API_URL}/events/${eventId}` 
                    : `${API_URL}/events`;
                
                const method = isEditMode ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to save event');
                }

                const event = await response.json();
                showMessage(
                    isEditMode ? 'Event updated successfully!' : 'Event created successfully!',
                    'success'
                );

                // Redirect to home page after short delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (error) {
                console.error('Error saving event:', error);
                showMessage(error.message || 'Failed to save event', 'error');
            }
        });
    </script>
</body>
</html>
