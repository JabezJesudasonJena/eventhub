<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Form - Eventify</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">✨ Eventify</a>
            <div class="navbar-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="form.html" class="nav-link active">Create Event</a>
                
                <div id="user-menu" class="user-menu hidden">
                    <span class="user-name" id="user-name-display"></span>
                    <button class="logout-btn" id="logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Back Link -->
        <a href="index.html" class="back-link">← Back to Events</a>

        <!-- Page Header -->
        <div class="page-header">
            <h1 id="form-title" class="page-title">Create New Event</h1>
        </div>

        <!-- Message display area -->
        <div id="message" class="message hidden"></div>

        <!-- Event form -->
        <div class="form-container">
            <form id="event-form">
                <div class="form-group">
                    <label for="name">Event Name *</label>
                    <input type="text" id="name" name="name" required 
                           placeholder="e.g., Tech Conference 2026">
                </div>

                <div class="form-group">
                    <label for="date">Event Date *</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="form-group">
                    <label for="location">Location *</label>
                    <input type="text" id="location" name="location" required 
                           placeholder="e.g., San Francisco, CA">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="5" 
                              placeholder="Tell people about your event..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submit-btn">Create Event</button>
                    <a href="index.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // API Base URL
        const API_URL = window.location.origin || 'http://localhost:3000';
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');
        const isEditMode = !!eventId;

        // Auth state
        let currentUser = null;
        let authToken = null;

        // Initialize auth
        function initAuth() {
            authToken = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            if (!authToken || !userStr) {
                // Not logged in, redirect to login
                alert('You must be logged in to create or edit events');
                window.location.href = 'login.html';
                return false;
            }
            
            try {
                currentUser = JSON.parse(userStr);
                
                // Check if admin
                if (currentUser.role !== 'admin') {
                    alert('Only admins can create or edit events');
                    window.location.href = 'index.html';
                    return false;
                }
                
                updateNavbar();
                return true;
            } catch (e) {
                console.error('Error parsing user data:', e);
                logout();
                return false;
            }
        }

        // Update navbar
        function updateNavbar() {
            const userMenu = document.getElementById('user-menu');
            if (currentUser) {
                userMenu.classList.remove('hidden');
                document.getElementById('user-name-display').textContent = currentUser.name;
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        document.getElementById('logout-btn')?.addEventListener('click', logout);

        // Update UI for edit mode
        if (isEditMode) {
            document.getElementById('form-title').textContent = 'Edit Event';
            document.getElementById('submit-btn').textContent = 'Update Event';
        }

        // Show message to user
        function showMessage(text, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            setTimeout(() => {
                messageEl.className = 'message hidden';
            }, 3000);
        }

        // Load event data for editing
        async function loadEventForEdit() {
            try {
                const response = await fetch(`${API_URL}/events/${eventId}`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                if (!response.ok) throw new Error('Event not found');
                
                const data = await response.json();
                const event = data.event || data;
                
                // Populate form fields
                document.getElementById('name').value = event.name;
                document.getElementById('date').value = event.date.split('T')[0];
                document.getElementById('location').value = event.location;
                document.getElementById('description').value = event.description || '';
            } catch (error) {
                console.error('Error loading event:', error);
                showMessage('Failed to load event data', 'error');
            }
        }

        // Handle form submission
        document.getElementById('event-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get form data
            const formData = {
                name: document.getElementById('name').value.trim(),
                date: document.getElementById('date').value,
                location: document.getElementById('location').value.trim(),
                description: document.getElementById('description').value.trim()
            };

            // Validation
            if (!formData.name || !formData.date || !formData.location) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            try {
                const url = isEditMode 
                    ? `${API_URL}/events/${eventId}` 
                    : `${API_URL}/events`;
                
                const method = isEditMode ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to save event');
                }

                const event = await response.json();
                showMessage(
                    isEditMode ? 'Event updated successfully!' : 'Event created successfully!',
                    'success'
                );

                // Redirect to home page after short delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (error) {
                console.error('Error saving event:', error);
                showMessage(error.message || 'Failed to save event', 'error');
            }
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            if (initAuth() && isEditMode) {
                loadEventForEdit();
            }
        });
    </script>
</body>
</html>
