<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventify - Modern Event Registration System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">✨ Eventify</a>
            <div class="navbar-menu">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="form.html" class="nav-link">Create Event</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Discover Amazing Events</h1>
        <p>Browse, create, and register for events all in one place</p>
        <div class="hero-cta">
            <a href="form.html" class="btn btn-primary btn-large">Create New Event</a>
        </div>
    </section>

    <!-- Main Container -->
    <div class="container">
        <!-- Message display area -->
        <div id="message" class="message hidden"></div>

        <!-- Events Section -->
        <section>
            <div class="section-header">
                <h2 class="section-title">Upcoming Events</h2>
                <p class="section-subtitle">Explore events happening near you</p>
            </div>

            <!-- Events list -->
            <div id="events-container" class="events-grid">
                <div class="loading">Loading events...</div>
            </div>
        </section>
    </div>

    <script>
        // API Base URL - Update this to your deployed backend URL
        const API_URL = window.location.origin || 'http://localhost:3000';

        // Show message to user
        function showMessage(text, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            setTimeout(() => {
                messageEl.className = 'message hidden';
            }, 3000);
        }

        // Format date for display
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        // Load all events
        async function loadEvents() {
            try {
                const response = await fetch(`${API_URL}/events`);
                if (!response.ok) throw new Error('Failed to fetch events');
                
                const events = await response.json();
                displayEvents(events);
            } catch (error) {
                console.error('Error loading events:', error);
                showMessage('Failed to load events', 'error');
                document.getElementById('events-container').innerHTML = 
                    '<div class="error">Failed to load events. Please try again.</div>';
            }
        }

        // Display events
        function displayEvents(events) {
            const container = document.getElementById('events-container');
            
            if (events.length === 0) {
                container.innerHTML = '<div class="empty-state">🎉 No events yet. Create your first event to get started!</div>';
                return;
            }

            container.innerHTML = events.map(event => `
                <div class="event-card">
                    <h3>${escapeHtml(event.name)}</h3>
                    <div class="event-info">
                        <p><strong>📅 Date:</strong> ${formatDate(event.date)}</p>
                        <p><strong>📍 Location:</strong> ${escapeHtml(event.location)}</p>
                        <p class="description">${escapeHtml(event.description || 'No description available')}</p>
                    </div>
                    <div class="event-actions">
                        <a href="event.html?id=${event.id}" class="btn btn-small btn-primary">View Details</a>
                        <a href="form.html?id=${event.id}" class="btn btn-small btn-secondary">Edit</a>
                        <button onclick="deleteEvent(${event.id})" class="btn btn-small btn-danger">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Delete event
        async function deleteEvent(eventId) {
            if (!confirm('Are you sure you want to delete this event? All registrations will also be deleted.')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/events/${eventId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('Failed to delete event');

                showMessage('Event deleted successfully!', 'success');
                loadEvents(); // Reload events
            } catch (error) {
                console.error('Error deleting event:', error);
                showMessage('Failed to delete event', 'error');
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load events on page load
        document.addEventListener('DOMContentLoaded', loadEvents);
    </script>
</body>
</html>
